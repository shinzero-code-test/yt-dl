name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip libssl-dev cmake autoconf automake zlib1g-dev libpng-dev libncurses5-dev
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install kivy==2.3.0
          pip install "plyer>=2.0"
          pip install Pillow
          pip install yt-dlp
          pip install androidstorage4kivy
      
      - name: Build debug APK
        run: |
          ls -la
          buildozer android debug --verbose
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: videodl-apk
          path: bin/*.apk
          retention-days: 7
