name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'videodl_android/**'
  pull_request:
    branches: [main]
    paths:
      - 'videodl_android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            wget \
            unzip \
            libssl-dev \
            cmake \
            autoconf \
            automake \
            zlib1g-dev \
            libpng-dev \
            libncurses5-dev \
            libtool
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Add Android SDK to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            $ANDROID_HOME
          key: android-sdk-${{ runner.os }}-${{ hashFiles('videodl_android/buildozer.spec') }}
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install kivy
          pip install "plyer<2.1.0"
          pip install Pillow
          pip install yt-dlp
      
      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('videodl_android/**') }}
      
      - name: Build debug APK
        run: |
          cd videodl_android
          buildozer android debug
        env:
          BUILDZOO_NO_CACHING: 1
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: videodl-apk
          path: videodl_android/bin/*.apk
          retention-days: 30
      
      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: videodl-source
          path: videodl_android/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: videodl-apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: *.apk
          body: |
            🎬 Video Downloader Android App
            
            ## Features:
            - Download from YouTube, TikTok, Twitter, Instagram, Facebook, and more
            - Multiple quality options (1080p, 720p, 480p, 360p)
            - Multiple formats (MP4, WebM, MP3, M4A)
            - Subtitles and thumbnail support
            - Simple and easy to use interface
            
            ## How to install:
            1. Download the APK below
            2. Enable "Install from unknown sources" in settings
            3. Open and enjoy!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
